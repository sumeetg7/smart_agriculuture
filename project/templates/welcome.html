<!DOCTYPE html>
<html>

<head>

    <title>Smart Weather Monitoring</title>

    <style>

        body{

            margin:0;

            padding:0;

            background:linear-gradient(
                135deg,
                #0f172a,
                #1e3a8a,
                #0ea5e9
            );

            height:100vh;

            display:flex;

            justify-content:center;

            align-items:center;

            font-family:Arial;
        }

        .box{

            text-align:center;

            color:white;

            background:rgba(255,255,255,0.1);

            padding:50px;

            border-radius:20px;

            backdrop-filter:blur(10px);

            box-shadow:0 10px 30px rgba(0,0,0,0.4);
        }

        h1{

            font-size:45px;
        }

        p{

            font-size:20px;
        }

        .btn{

            margin-top:30px;

            padding:15px 35px;

            font-size:20px;

            border:none;

            border-radius:30px;

            background:#00c3ff;

            color:white;

            cursor:pointer;

            text-decoration:none;
        }

        .btn:hover{

            background:#0099cc;
        }

    </style>

</head>

<body>

<div class="box">

<h1>
🌾 Smart Weather Monitoring System
</h1>

<p>

Monitor your farm anytime,
anywhere.

</p>

<br>

<a href="/register"
class="btn">

Get Started

</a>

</div>

</body>

</html>
